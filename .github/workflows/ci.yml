name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  contract:
    name: Smart contract (forge test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-contract
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      # lib/ is gitignored (not vendored), so fetch the pinned dependencies that
      # foundry.toml's remappings expect.
      - name: Install contract dependencies
        run: |
          rm -rf lib && mkdir -p lib
          git clone --depth 1 --branch v5.1.0 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          git clone --depth 1 --branch v1.9.4 https://github.com/foundry-rs/forge-std.git lib/forge-std
      - run: forge --version
      - run: forge test -vvv

  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: onchain_attendance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/onchain_attendance_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      # --if-present so the workflow is green on branches that predate the test suite
      - run: npm test --if-present

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run build
